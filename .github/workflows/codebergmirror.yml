name: Mirror to Codeberg

on:
  workflow_dispatch: 
  workflow_run:
    workflows:
      - "Generate README and API"
    types:
      - completed
jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push mirror
        run: |
          git remote add codeberg https://arfshl:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/arfshl/chromium-build-repolist.git
          git push --mirror codeberg
